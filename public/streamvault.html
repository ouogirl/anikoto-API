<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamVault - HLS Downloader</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --primary: #3b82f6;
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
      --warn: #f59e0b;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .panel {
      background: var(--surface);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .header h2 { margin: 0; }
    .input-group {
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: var(--primary);
    }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    
    /* Log Window */
    .log-window {
      background: #020617;
      padding: 15px;
      border-radius: 8px;
      height: 150px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border: 1px solid #334155;
    }
    .log-info { color: var(--text); }
    .log-success { color: var(--success); }
    .log-warn { color: var(--warn); }
    .log-error { color: var(--error); }

    /* Slots */
    .slot {
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px solid #334155;
    }
    .slot-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .progress-bar {
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.2s;
    }
    .slot-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="panel">
    <div class="header">
      <h2>StreamVault</h2>
      <div>
        <label><input type="checkbox" id="autoSave" checked> Auto-Save File</label>
      </div>
    </div>
    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Enter video URL (e.g., https://anikoto.cz/watch/...)">
      <button onclick="startTask()">Download</button>
    </div>
  </div>

  <div class="panel">
    <div class="header">
      <h2>System Logs</h2>
    </div>
    <div class="log-window" id="logWindow"></div>
  </div>

  <div class="panel" id="slotsPanel" style="display: none;">
    <div class="header">
      <h2>Active Downloads</h2>
    </div>
    <div id="slotsContainer"></div>
  </div>
</div>

<script>
  // ==========================================
  // GLOBALS & CONFIG
  // ==========================================
  const API = "https://anikoto-api-ten.vercel.app"; // Your backend API
  let Slots = [];
  let Done = [];
  let TotalBytes = 0;
  let DoneCount = 0;

  const UI = {
    log: document.getElementById('logWindow'),
    url: document.getElementById('urlInput'),
    slots: document.getElementById('slotsContainer'),
    slotsPanel: document.getElementById('slotsPanel'),
    autoSave: document.getElementById('autoSave')
  };

  // ==========================================
  // UTILITIES
  // ==========================================
  function log(msg, type = 'info') {
    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
    const div = document.createElement('div');
    div.className = `log-${type}`;
    div.textContent = `[${time}] ${msg}`;
    UI.log.appendChild(div);
    UI.log.scrollTop = UI.log.scrollHeight;
  }

  function fmtBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }

  function triggerBrowserDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ==========================================
  // UI MANAGEMENT
  // ==========================================
  function createSlotUI(idx, url) {
    UI.slotsPanel.style.display = 'block';
    const div = document.createElement('div');
    div.className = 'slot';
    div.id = `slot-${idx}`;
    div.innerHTML = `
      <div class="slot-header">
        <strong style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;" title="${url}">${url}</strong>
        <span id="status-${idx}">Initializing...</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="fill-${idx}"></div></div>
      <div class="slot-stats">
        <span id="progress-text-${idx}">0 / 0 chunks</span>
        <span id="size-${idx}">0 MB</span>
      </div>
    `;
    UI.slots.appendChild(div);
  }

  function updateSlotUI(idx) {
    const slot = Slots[idx];
    if (!slot) return;
    
    document.getElementById(`status-${idx}`).textContent = slot.status;
    document.getElementById(`size-${idx}`).textContent = fmtBytes(slot.downloaded);
    
    if (slot.segTotal > 0) {
      const pct = (slot.segDone / slot.segTotal) * 100;
      document.getElementById(`fill-${idx}`).style.width = `${pct}%`;
      document.getElementById(`progress-text-${idx}`).textContent = `${slot.segDone} / ${slot.segTotal} chunks`;
    }
  }

  // ==========================================
  // MAIN LOGIC
  // ==========================================
  async function startTask() {
    const url = UI.url.value.trim();
    if (!url) return alert('Please enter a URL');
    UI.url.value = '';

    const idx = Slots.length;
    const controller = new AbortController();
    Slots.push({
      url,
      status: 'Extracting data...',
      downloaded: 0,
      segDone: 0,
      segTotal: 0,
      controller
    });

    createSlotUI(idx, url);
    log(`Slot ${idx + 1}: Starting extraction for ${url}`);

    try {
      // 1. EXTRACT DATA FROM API
      const extractUrl = `${API}/api/extract?url=${encodeURIComponent(url)}`;
      const res = await fetch(extractUrl, { signal: controller.signal });
      
      if (!res.ok) throw new Error(`Extraction HTTP ${res.status}`);
      const data = await res.json();

      // Adapt based on your exact API response structure
      const m3u8Url = data.m3u8 || data.url || (data.sources && data.sources[0]?.file);
      if (!m3u8Url) throw new Error("Could not find m3u8 stream in API response");

      const referer = data.referer || data.headers?.Referer || "";
      let filename = data.title ? data.title.replace(/[^a-z0-9]/gi, '_') : `video_${Date.now()}`;
      if (!filename.endsWith('.ts')) filename += '.ts';

      log(`Slot ${idx + 1}: Found playlist, beginning download...`, 'success');
      
      // 2. DOWNLOAD HLS STREAM
      await downloadHLS(idx, m3u8Url, referer, filename, controller.signal);

    } catch (err) {
      if (err.name === 'AbortError') return;
      Slots[idx].status = `Error: ${err.message}`;
      updateSlotUI(idx);
      log(`Slot ${idx + 1}: ${err.message}`, 'error');
    }
  }

  // ==========================================
  // UPDATED HLS DOWNLOADER (WITH FALLBACKS)
  // ==========================================
  async function downloadHLS(idx, m3u8Url, referer, filename, signal) {
    Slots[idx].status = 'Fetching playlist...';
    updateSlotUI(idx);

    let fetchUrl = m3u8Url.includes('/api/proxy') ? m3u8Url : 
      `${API}/api/proxy?url=${encodeURIComponent(m3u8Url)}&referer=${encodeURIComponent(referer || '')}`;

    let resp;
    try {
      // Attempt 1: Route through the API Proxy
      resp = await fetch(fetchUrl, { signal });
      if (!resp.ok) throw new Error(`Proxy HTTP ${resp.status}`);
    } catch (proxyErr) {
      if (signal.aborted) throw proxyErr;
      log(`Slot ${idx + 1}: Proxy blocked (${proxyErr.message}), trying direct connection...`, 'warn');
      
      // Attempt 2: Direct connection fallback (bypasses proxy CORS if possible)
      resp = await fetch(m3u8Url, { signal });
      if (!resp.ok) throw new Error(`Playlist blocked: HTTP ${resp.status}. You may be rate-limited or require a custom proxy.`);
    }

    const m3u8Text = await resp.text();
    const lines = m3u8Text.split('\n').map(l => l.trim()).filter(Boolean);

    const resolveUrl = u => u.startsWith('http') ? u : m3u8Url.replace(/[^/]*$/, '') + u;

    // Handle Master Playlists (Auto-select highest resolution)
    if (lines.some(l => l.includes('#EXT-X-STREAM-INF'))) {
      let bestUrl = null;
      for (let j = 0; j < lines.length; j++) {
        if (lines[j].startsWith('#EXT-X-STREAM-INF') && lines[j+1]) {
          bestUrl = lines[j+1]; 
          break; // Grabs the first (usually highest) resolution
        }
      }
      return downloadHLS(idx, resolveUrl(bestUrl), referer, filename, signal);
    }

    const segmentUrls = lines.filter(l => l && !l.startsWith('#')).map(resolveUrl);
    if (!segmentUrls.length) throw new Error('No video chunks found in playlist.');

    Slots[idx].segTotal = segmentUrls.length;
    Slots[idx].segDone = 0;
    updateSlotUI(idx);

    const CONCURRENCY = 10;
    const segmentData = new Array(segmentUrls.length);
    let nextSegIdx = 0;
    let completedSegs = 0;

    const fetchSegment = async () => {
      while (nextSegIdx < segmentUrls.length) {
        if (signal.aborted) throw new Error('AbortError');
        const currentIdx = nextSegIdx++;
        
        let target = segmentUrls[currentIdx];
        if (!target.includes('/api/proxy') && API !== '') {
           target = `${API}/api/proxy?url=${encodeURIComponent(target)}&referer=${encodeURIComponent(referer || '')}`;
        }
        
        try {
          let r = await fetch(target, { signal });
          
          // Direct fallback for chunks if proxy fails
          if (!r.ok) {
             r = await fetch(segmentUrls[currentIdx], { signal });
             if (!r.ok) throw new Error(`HTTP ${r.status}`);
          }

          const buf = await r.arrayBuffer();
          
          segmentData[currentIdx] = new Uint8Array(buf);
          completedSegs++;
          Slots[idx].segDone = completedSegs;
          Slots[idx].downloaded += buf.byteLength;
          TotalBytes += buf.byteLength;
          
          updateSlotUI(idx);
        } catch (err) {
          log(`Slot ${idx + 1}: Chunk ${currentIdx} failed, halting download.`, 'error');
          throw err;
        }
      }
    };

    Slots[idx].status = 'Downloading segments...';
    updateSlotUI(idx);

    // Run parallel chunk downloads
    const workers = Array(Math.min(CONCURRENCY, segmentUrls.length)).fill(null).map(fetchSegment);
    await Promise.all(workers);

    if (signal.aborted) return;

    Slots[idx].status = 'Compiling file...';
    updateSlotUI(idx);

    // Merge chunks into one file
    const totalLength = segmentData.reduce((acc, val) => acc + (val ? val.length : 0), 0);
    const merged = new Uint8Array(totalLength);
    let offset = 0;
    for (let arr of segmentData) {
      if (arr) {
        merged.set(arr, offset);
        offset += arr.length;
      }
    }

    const blob = new Blob([merged], { type: 'video/mp2t' });
    
    DoneCount++;
    Done.push({ title: filename, size: merged.length, blob, filename });
    
    Slots[idx].status = 'Finished';
    document.getElementById(`status-${idx}`).style.color = 'var(--success)';
    updateSlotUI(idx);
    
    if (UI.autoSave.checked) {
      triggerBrowserDownload(blob, filename);
    }
    
    log(`Slot ${idx + 1}: Completed ${filename} (${fmtBytes(merged.length)})`, 'success');
  }
</script>

</body>
</html>
